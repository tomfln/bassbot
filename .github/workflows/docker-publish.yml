name: Lint, build & publish

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_BOT: ghcr.io/${{ github.repository_owner }}/bassbot
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/bassbot-web

jobs:
  # ── Always runs on every push / PR ──────────────────────────
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run eslint
      - run: bun run lint
      - name: Lint web dashboard
        run: cd web && bun run lint

  # ── Determine which images need building / publishing ──────
  check:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      bot_version: ${{ steps.plan.outputs.bot_version }}
      web_version: ${{ steps.plan.outputs.web_version }}
      publish_bot: ${{ steps.plan.outputs.publish_bot }}
      publish_web: ${{ steps.plan.outputs.publish_web }}
      build_bot: ${{ steps.plan.outputs.build_bot }}
      build_web: ${{ steps.plan.outputs.build_web }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Plan Docker build and publish
        id: plan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_ACTOR: ${{ github.actor }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run ci:docker-check

  # ── Build (and optionally push) bot image ───────────────────
  build-bot:
    needs: [lint, check]
    if: needs.check.outputs.build_bot == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        if: needs.check.outputs.publish_bot == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - name: Build & push bot
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.bot
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.check.outputs.publish_bot == 'true' }}
          tags: |
            ${{ env.IMAGE_BOT }}:latest
            ${{ env.IMAGE_BOT }}:${{ needs.check.outputs.bot_version }}
            ${{ env.IMAGE_BOT }}:${{ steps.sha.outputs.short }}

  # ── Build (and optionally push) web image ───────────────────
  build-web:
    needs: [lint, check]
    if: needs.check.outputs.build_web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        if: needs.check.outputs.publish_web == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - name: Build & push web
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.check.outputs.publish_web == 'true' }}
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ needs.check.outputs.web_version }}
            ${{ env.IMAGE_WEB }}:${{ steps.sha.outputs.short }}
