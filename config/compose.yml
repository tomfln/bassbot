# Docker Compose for BassBot + Dashboard + Lavalink
#
# Quick start:
#   1. Create a data directory:  mkdir bassbot-data
#   2. Fetch sample configs:
#        curl -o bassbot-data/config.json https://raw.githubusercontent.com/TomFln/bassbot/main/config/config.example.json
#        curl -o bassbot-data/application.yml https://raw.githubusercontent.com/TomFln/bassbot/main/config/application.yml
#   3. Edit bassbot-data/config.json — fill in ALL values (bot token, secrets, OAuth, etc.)
#   4. (Optional, recommended) Set up YouTube OAuth — see README for instructions.
#   5. Start:  docker compose up -d
#
# All configuration lives in config.json

services:
  bassbot:
    image: ghcr.io/tomfln/bassbot:latest
    container_name: bassbot
    restart: unless-stopped
    networks:
      - lavalink
    ports:
      - "3001:3001"
    volumes:
      - ./bassbot-data:/data

  web:
    image: ghcr.io/tomfln/bassbot-web:latest
    container_name: bassbot-web
    restart: unless-stopped
    networks:
      - lavalink
    ports:
      - "3000:3000"
    volumes:
      - ./bassbot-data:/data

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink
    restart: unless-stopped
    environment:
      _JAVA_OPTIONS: -Xmx4G -Xms1G -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:ParallelGCThreads=4
    volumes:
      - ./bassbot-data/application.yml:/opt/Lavalink/application.yml
    expose:
      - 2333
    networks:
      - lavalink

networks:
  lavalink:
    name: lavalink